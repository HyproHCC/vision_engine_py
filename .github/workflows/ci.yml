name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-ui.txt
      - run: python -m pytest tests -k "not test_characterization and not test_session and not test_dark_line_found_via_pipeline_inversion" -q