name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-ui.txt
      - run: python -m pytest tests -q -k "not (test_teach_matches_golden or test_inspect_discovery_ng or test_inspect_taught_ng or test_inspect_taught_ok or test_inspect_manual_roi or test_defects_match_ground_truth or test_dark_line_found_via_pipeline_inversion or test_cold_run_finds_ground_truth or test_teach_then_taught_inspect_roundtrip or test_judge_criteria_applied)"