name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements-ui.txt
      - run: python -m pytest -k "not test_teach_matches_golden and not test_inspect_discovery_ng and not test_inspect_taught_ng and not test_inspect_taught_ok and not test_inspect_manual_roi and not test_defects_match_ground_truth and not test_dark_line_found_via_pipeline_inversion and not test_cold_run_finds_ground_truth and not test_teach_then_taught_inspect_roundtrip and not test_judge_criteria_applied"