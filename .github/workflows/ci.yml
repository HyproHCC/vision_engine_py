name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r vision_engine_py/requirements-ui.txt
      - run: python -m pytest tests -q
        working-directory: vision_engine_py